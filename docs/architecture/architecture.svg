<svg viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#0F172A">
    AI-Powered Supply Chain Risk Intelligence — Architecture
  </text>

  <!-- ═══════════════════════════════════════════════════════
       ROW 1 — DATA SOURCES
  ══════════════════════════════════════════════════════════ -->
  <!-- Kaggle MCP -->
  <rect x="60" y="60" width="160" height="56" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="140" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">Kaggle MCP</text>
  <text x="140" y="100" text-anchor="middle" font-size="10" fill="#3B82F6">DataCo (180k rows)</text>

  <!-- Local CSV -->
  <rect x="260" y="60" width="160" height="56" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="340" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">Local CSV</text>
  <text x="340" y="100" text-anchor="middle" font-size="10" fill="#10B981">Fallback dataset</text>

  <!-- Source label -->
  <text x="240" y="56" text-anchor="middle" font-size="10" fill="#94A3B8" font-style="italic">Data Sources</text>

  <!-- ═══════════════════════════════════════════════════════
       ROW 2 — INGESTION PIPELINE
  ══════════════════════════════════════════════════════════ -->
  <rect x="60" y="160" width="360" height="64" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="240" y="183" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">Ingestion Pipeline</text>
  <text x="240" y="200" text-anchor="middle" font-size="10" fill="#B45309">Load → Sample (2.5k) → Transform to NL Docs → Embed (BGE-small-en-v1.5, 384d)</text>
  <text x="240" y="215" text-anchor="middle" font-size="10" fill="#B45309">→ Upsert ChromaDB + Build BM25 Index</text>

  <!-- arrows from sources to ingestion -->
  <line x1="140" y1="116" x2="180" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="116" x2="300" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       ROW 3 — STORAGE
  ══════════════════════════════════════════════════════════ -->
  <!-- ChromaDB -->
  <rect x="60" y="276" width="155" height="56" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="137" y="299" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">ChromaDB</text>
  <text x="137" y="316" text-anchor="middle" font-size="10" fill="#7C3AED">Dense vectors (cosine)</text>

  <!-- BM25 -->
  <rect x="245" y="276" width="155" height="56" rx="8" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="322" y="299" text-anchor="middle" font-size="12" font-weight="bold" fill="#9F1239">BM25 Index</text>
  <text x="322" y="316" text-anchor="middle" font-size="10" fill="#E11D48">Sparse keyword</text>

  <!-- SQLite / Cache -->
  <rect x="430" y="276" width="155" height="56" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="507" y="299" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">SQLite + Cache</text>
  <text x="507" y="316" text-anchor="middle" font-size="10" fill="#059669">Checkpointer · HILT · Semantic cache</text>

  <!-- arrows ingestion → storage -->
  <line x1="180" y1="224" x2="137" y2="276" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="240" y1="224" x2="240" y2="276" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       ROW 4 — HYBRID RETRIEVAL
  ══════════════════════════════════════════════════════════ -->
  <rect x="60" y="380" width="360" height="72" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="240" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">Hybrid Retrieval Layer</text>
  <text x="240" y="419" text-anchor="middle" font-size="10" fill="#2563EB">Dense top-20 + Sparse top-20 → RRF Fusion (k=60)</text>
  <text x="240" y="436" text-anchor="middle" font-size="10" fill="#2563EB">→ Cross-encoder Rerank → CRAG (reformulate if score &lt; 0.6)</text>

  <!-- arrows storage → retrieval -->
  <line x1="137" y1="332" x2="160" y2="380" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="322" y1="332" x2="300" y2="380" stroke="#F43F5E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       ROW 5 — LANGGRAPH MULTI-AGENT
  ══════════════════════════════════════════════════════════ -->
  <!-- Outer box -->
  <rect x="60" y="496" width="530" height="140" rx="10" fill="#FAFAFA" stroke="#6366F1" stroke-width="2"/>
  <text x="325" y="516" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338CA">LangGraph Multi-Agent System</text>

  <!-- Orchestrator -->
  <rect x="215" y="524" width="140" height="44" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="285" y="542" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338CA">Orchestrator</text>
  <text x="285" y="558" text-anchor="middle" font-size="9" fill="#6366F1">Intent + Severity (Groq 8B)</text>

  <!-- Specialist agents -->
  <rect x="80" y="584" width="120" height="40" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="140" y="601" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400E">Supplier Risk</text>
  <text x="140" y="615" text-anchor="middle" font-size="9" fill="#B45309">Defects · Lead times</text>

  <rect x="225" y="584" width="120" height="40" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="285" y="601" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">Shipment Analysis</text>
  <text x="285" y="615" text-anchor="middle" font-size="9" fill="#059669">Delays · Fraud · Routes</text>

  <rect x="370" y="584" width="120" height="40" rx="6" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.5"/>
  <text x="430" y="601" text-anchor="middle" font-size="10" font-weight="bold" fill="#9D174D">Inventory Intel</text>
  <text x="430" y="615" text-anchor="middle" font-size="9" fill="#DB2777">Stock · Demand · Stockout</text>

  <!-- Recommendation agent -->
  <rect x="215" y="636" width="140" height="40" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="285" y="653" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">Recommendation</text>
  <text x="285" y="667" text-anchor="middle" font-size="9" fill="#2563EB">Synthesise · Cite · Validate</text>

  <!-- Internal agent arrows -->
  <line x1="245" y1="568" x2="160" y2="584" stroke="#6366F1" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="285" y1="568" x2="285" y2="584" stroke="#6366F1" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="325" y1="568" x2="410" y2="584" stroke="#6366F1" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="160" y1="624" x2="255" y2="636" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="285" y1="624" x2="285" y2="636" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="410" y1="624" x2="315" y2="636" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- arrow retrieval → orchestrator -->
  <line x1="240" y1="452" x2="262" y2="524" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT COLUMN — FASTAPI + FRONTEND
  ══════════════════════════════════════════════════════════ -->
  <!-- FastAPI -->
  <rect x="630" y="380" width="280" height="80" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="770" y="404" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">FastAPI Backend</text>
  <text x="770" y="422" text-anchor="middle" font-size="10" fill="#059669">WebSocket streaming  ·  REST endpoints</text>
  <text x="770" y="438" text-anchor="middle" font-size="10" fill="#059669">Guardrails  ·  Semantic cache  ·  LangSmith tracing</text>

  <!-- Frontend -->
  <rect x="630" y="500" width="280" height="100" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="770" y="524" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">React Frontend</text>
  <text x="770" y="542" text-anchor="middle" font-size="10" fill="#B45309">/ Chat (ChatGPT-style + FlowViz)</text>
  <text x="770" y="558" text-anchor="middle" font-size="10" fill="#B45309">/analytics  Dashboard (Recharts)</text>
  <text x="770" y="574" text-anchor="middle" font-size="10" fill="#B45309">/admin  Ingestion control  ·  /present  Slides</text>

  <!-- Agents → FastAPI -->
  <line x1="590" y1="566" x2="630" y2="430" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- FastAPI → Frontend -->
  <line x1="770" y1="460" x2="770" y2="500" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT COLUMN — OBSERVABILITY / EVAL
  ══════════════════════════════════════════════════════════ -->
  <rect x="630" y="190" width="280" height="150" rx="8" fill="#F8F8FF" stroke="#818CF8" stroke-width="1.5"/>
  <text x="770" y="213" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338CA">Observability &amp; Evaluation</text>
  <text x="770" y="233" text-anchor="middle" font-size="10" fill="#6366F1">LangSmith — trace every agent step</text>
  <rect x="650" y="242" width="240" height="1" fill="#E0E7FF"/>
  <text x="770" y="260" text-anchor="middle" font-size="10" fill="#6366F1">DeepEval — Faithfulness · Answer Relevancy</text>
  <text x="770" y="276" text-anchor="middle" font-size="10" fill="#6366F1">Contextual Precision · Recall · Hallucination</text>
  <rect x="650" y="285" width="240" height="1" fill="#E0E7FF"/>
  <text x="770" y="302" text-anchor="middle" font-size="10" fill="#6366F1">RAGAS — Context Precision · Context Recall</text>
  <text x="770" y="318" text-anchor="middle" font-size="10" fill="#6366F1">Answer Faithfulness · Answer Relevancy</text>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT COLUMN — LLM ROUTING
  ══════════════════════════════════════════════════════════ -->
  <rect x="630" y="60" width="280" height="110" rx="8" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="770" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#9F1239">LLM Routing + Fallback</text>
  <text x="770" y="103" text-anchor="middle" font-size="10" fill="#E11D48">gpt-4o-mini → reasoning · recommendation · judge</text>
  <text x="770" y="120" text-anchor="middle" font-size="10" fill="#E11D48">llama-3.3-70b (Groq) → summarization</text>
  <text x="770" y="137" text-anchor="middle" font-size="10" fill="#E11D48">llama-3.1-8b (Groq) → routing · classification</text>
  <text x="770" y="154" text-anchor="middle" font-size="10" fill="#9F1239">Fallback: OpenAI → Groq-70B → Groq-8B</text>

  <!-- Legend -->
  <rect x="60" y="685" width="840" height="28" rx="6" fill="#F1F5F9"/>
  <circle cx="80" cy="699" r="5" fill="#3B82F6"/>
  <text x="90" y="703" font-size="9" fill="#475569">Dense retrieval</text>
  <circle cx="160" cy="699" r="5" fill="#F43F5E"/>
  <text x="170" y="703" font-size="9" fill="#475569">Sparse retrieval</text>
  <circle cx="240" cy="699" r="5" fill="#6366F1"/>
  <text x="250" y="703" font-size="9" fill="#475569">Agent flow</text>
  <circle cx="310" cy="699" r="5" fill="#F59E0B"/>
  <text x="320" y="703" font-size="9" fill="#475569">Ingestion</text>
  <circle cx="380" cy="699" r="5" fill="#10B981"/>
  <text x="390" y="703" font-size="9" fill="#475569">API / Persistence</text>
  <circle cx="470" cy="699" r="5" fill="#8B5CF6"/>
  <text x="480" y="703" font-size="9" fill="#475569">Vector storage</text>
  <text x="770" y="703" text-anchor="middle" font-size="9" fill="#94A3B8">AFDE Capstone — May 2026</text>
</svg>
